<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITA-Audio Demo</title>
    <script src="https://unpkg.com/socket.io-client@4.8.1/dist/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f0f0f0 100%);
        }

        /* 让登录区和主内容区都居中 */
        #authSection, #mainSection {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
        }

        .container, #authSection {
            max-height: 90vh;
            overflow: auto;
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.95);
            padding: 30px 30px 20px 30px;
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            max-width: 700px;
            width: 100%;
            margin: 0 auto; /* 水平居中 */
        }

        .banner-img {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            margin-bottom: 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            color: #3b3b6d;
            letter-spacing: 1px;
        }
        h2 {
            color: #5a5a89;
            font-size: 1.2rem;
            margin-bottom: 8px;
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        canvas {
            border: 1.5px solid #b3b3e6;
            margin: 10px 0;
            border-radius: 8px;
            background: #f8f9ff;
        }
        button {
            margin: 5px;
            padding: 10px 28px;
            font-size: 16px;
            border: none;
            border-radius: 24px;
            background: linear-gradient(90deg, #6a82fb 0%, #fc5c7d 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px rgba(100,100,200,0.08);
        }
        button:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            box-shadow: 0 4px 16px rgba(100,100,200,0.18);
            transform: translateY(-2px) scale(1.03);
        }
        .alert {
            display: none;
            margin-top: 20px;
            padding: 10px;
            background-color: #f44336;
            color: white;
            border-radius: 5px;
        }
        .text-input-container {
            margin-top: 30px;
        }
        .text-input-container textarea {
            padding: 12px;
            font-size: 16px;
            width: 90%;
            height: 120px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1.5px solid #b3b3e6;
            background: #f8f9ff;
            resize: none;
            overflow: auto;
            word-wrap: break-word;
            transition: border 0.2s;
        }
        .text-input-container textarea:focus {
            border: 1.5px solid #6a82fb;
            outline: none;
        }
        .input-icon {
            margin-right: 6px;
            color: #6a82fb;
        }
        .audio-icon {
            color: #fc5c7d;
            margin-right: 6px;
        }
        .time-box {
            font-size: 1.2rem;
            padding: 12px;
            background-color: #e0e7ff;
            border-radius: 8px;
            color: #3b3b6d;
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
        }
        /* Responsive */
        @media (max-width: 800px) {
            .container { max-width: 98vw; }
            .banner-img { max-width: 98vw; }
        }
    </style>
</head>
<body>
    <!-- 鉴权区 -->
    <!-- <div id="authSection" style="display: block;">
        <h2><i class="fa-solid fa-lock"></i>Login</h2>
        <input type="password" id="password" placeholder="Enter password" style="padding:10px; border-radius:8px; border:1.5px solid #b3b3e6; font-size:16px;">
        <button id="loginButton">Login</button>
    </div> -->
    <!-- 主内容区 -->
    <!-- <div id="mainSection" style="display: none;"> -->
    <div id="mainSection">
        <div class="container">
            <!-- <img src="https://raw.githubusercontent.com/VITA-MLLM/VITA-Audio/refs/heads/main/asset/vita-audio_logo.jpg" class="banner-img" alt="Banner"> -->
            <img src="https://raw.githubusercontent.com/TME-Lyra-Lab/QinYu/main/vita_qinyu_image.png" class="banner-img" alt="Banner">
            <!-- <h1>VITA-Audio Demo</h1> -->
            <button id="startButton"><i class="fa-solid fa-microphone"></i> Dialogue Start</button>
            <button id="stopButton" disabled><i class="fa-solid fa-stop"></i> Dialogue Stop</button>
            <h2><i class="fa-solid fa-wave-square audio-icon"></i>Input Waveform</h2>
            <canvas id="inputCanvas" width="600" height="100"></canvas>
            <h2><i class="fa-solid fa-wave-square audio-icon"></i>Output Waveform</h2>
            <canvas id="outputCanvas" width="600" height="100"></canvas>
            <audio id="remoteAudio" autoplay playsinline></audio>
            <div id="alertBox" class="alert">Too many users connected. Please refresh and try again.</div>
            <div id="alertBox2" class="alert">Connect time out. Please refresh and reconnect.</div>
            <div id="alertBox3" class="alert">Prompt set success.</div>
            <h2><i class="fa-solid fa-clock"></i> First Audio Generation Time</h2>
            <div id="generationTime" class="time-box">
                Waiting for first audio...
            </div>
    </div>
    
    <script>
        // 鉴权相关
        // const passwordInput = document.getElementById('password');
        // const loginButton = document.getElementById('loginButton');
        // const authSection = document.getElementById('authSection');
        // const mainSection = document.getElementById('mainSection');
        // const socket = io({ transports: ['websocket'] });

        // // Handle login
        // loginButton.addEventListener('click', function() {
        //     const password = passwordInput.value;
        //     socket.emit('authenticate', { password: password });
        // });

        // // Listen for authentication success
        // socket.on('authenticated', function() {
        //     authSection.style.display = 'none';
        //     mainSection.style.display = 'block';
        // });

        // // Listen for authentication failure
        // socket.on('authentication_failed', function() {
        //     alert('Authentication failed. Please try again.');
        // });

        const mainSection = document.getElementById('mainSection');
        const socket = io({ 
            transports: ['websocket'],
            path: '/vita/socket.io/'
        });
        socket.on('first_audio_time', function(data) {
            // data.time 是后端发来的时间字符串
            isFirstPacket = true;  // 重置首包标志
            document.getElementById('generationTime').textContent = data.time;
        });
        // 主功能相关
        const remoteAudio = document.getElementById('remoteAudio');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const inputCanvas = document.getElementById('inputCanvas');
        const outputCanvas = document.getElementById('outputCanvas');
        const inputCtx = inputCanvas.getContext('2d');
        const outputCtx = outputCanvas.getContext('2d');
        const alertBox = document.getElementById('alertBox');
        const alertBox2 = document.getElementById('alertBox2');
        const alertBox3 = document.getElementById('alertBox3');

        const audioQueue = [];
        let isPlaying = false;
        let currentSource = null;

        let localStream;
        let audioContext;
        let audioContext2;
        let processor;
        let isRecording = false;
        const fixedSampleRate = 16000;
        // 新增缓冲配置：解决断流/堆积，核心抗卡顿
        const BUFFER_THRESHOLD = 2;
        const MAX_QUEUE_LENGTH = 5;

        startButton.addEventListener('click', startRecording);
        stopButton.addEventListener('click', stopRecording);

        audioContext2 = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 32000 });

        async function startRecording() {
            audioQueue.length = 0;
            isFirstPacket = true;  // 重置首包标志
            if (currentSource) {
                currentSource.stop();
                currentSource = null;
            }
            isPlaying = false;
            
            // 修复：规范关闭音频上下文，等待完成并置空，避免资源泄漏
            if (audioContext) {
                await audioContext.close();
                audioContext = null;
            }
            if (processor) {
                processor.disconnect();
                processor = null;
            }

            localStream = await navigator.mediaDevices.getUserMedia({ audio: {autoGainControl: false, echoCancellation: true, noiseSuppression: false, latency: 0.001} });

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: fixedSampleRate });
            const input = audioContext.createMediaStreamSource(localStream);
            // 修复：增大缓冲区到1024，减少碎片化数据发送，解决衔接咔嚓
            processor = audioContext.createScriptProcessor(1024, 1, 1);

            processor.onaudioprocess = (e) => {
                if (!isRecording) return;

                const inputData = e.inputBuffer.getChannelData(0);

                const int16Array = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    int16Array[i] = inputData[i] * 0x7FFF;
                }
                socket.emit('audio', JSON.stringify({ sample_rate: audioContext.sampleRate, audio: Array.from(new Uint8Array(int16Array.buffer)) }));
                // 修复：帧回调绘制波形，避免阻塞音频处理线程
                requestAnimationFrame(() => {
                    drawWaveform(inputData, inputCtx);
                });
            };

            input.connect(processor);
            processor.connect(audioContext.destination);

            isRecording = true;
            startButton.disabled = true;
            stopButton.disabled = false;

            socket.emit('recording-started');
        }

        // 修复：完善资源释放+异常捕获，避免设备冲突
        function stopRecording() {
            try {
                audioQueue.length = 0;
                isFirstPacket = true;  // 重置首包标志，为下次对话做准备
                if (currentSource) {
                    currentSource.stop();
                    currentSource = null;
                }
                isPlaying = false;
                isRecording = false;
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
                startButton.disabled = false;
                stopButton.disabled = true;

                socket.emit('recording-stopped');
            } catch (e) {
                console.error('停止录音错误:', e);
            }
        }

        socket.on('too_many_users', (data) => {
            alert('Too many users connected. Please refresh and try again.');
        });

        socket.on('out_time', (data) => {
            alert('Connect time out. Please refresh and reconnect.');
        });

        socket.on('prompt_success', (data) => {
            alert('Prompt set success. Please restart interaction.');
        });
        
        // 修复：加缓冲阈值/队列限流/异常捕获，解决断流卡顿
        let isFirstPacket = true;  // 标记是否为首包
        socket.on('audio', (data) => {
            try {
                if (audioQueue.length >= MAX_QUEUE_LENGTH) {
                    audioQueue.shift();
                }
                audioQueue.push(data);
                // 首包立即播放，后续包等待缓冲
                if (!isPlaying && (isFirstPacket || audioQueue.length >= BUFFER_THRESHOLD)) {
                    isFirstPacket = false;  // 首包已播放，后续走缓冲逻辑
                    playNextAudio();
                }
            } catch (e) {
                console.error('音频分片接收错误，跳过:', e);
            }
        });

        socket.on('stop_tts', () => {
            audioQueue.length = 0;
            isFirstPacket = true;  // 重置首包标志，准备下一轮对话
            if (currentSource) {
                currentSource.stop();
                currentSource = null;
            }
            isPlaying = false;
        });

        // 核心修复：采样率匹配/异步发送/全链路异常容错/主线程释放
        function playNextAudio() {
            if (audioQueue.length === 0) {
                isPlaying = false;
                // 异步发送，避免阻塞播放主线程
                setTimeout(() => socket.emit('tts_stopped'), 0);
                return;
            }

            isPlaying = true;
            // 异步发送，避免阻塞播放主线程
            setTimeout(() => socket.emit('tts_playing'), 0);

            try {
                const data = audioQueue.shift();
                let int16Array;

                if (data instanceof ArrayBuffer) {
                    int16Array = new Int16Array(data);
                } else if (data && data.type === 'Buffer' && Array.isArray(data.data)) {
                    const uint8 = new Uint8Array(data.data);
                    int16Array = new Int16Array(uint8.buffer);
                } else {
                    console.error('未知音频格式，跳过该分片:', data);
                    playNextAudio();
                    return;
                }

                const float32Array = new Float32Array(int16Array.length);
                for (let i = 0; i < int16Array.length; i++) {
                    float32Array[i] = int16Array[i] / 32768.0;
                }

                // 修复：用固定16000Hz创建缓冲区，彻底避免浏览器重采样
                const audioBuffer = audioContext2.createBuffer(1, float32Array.length, audioContext2.sampleRate);
                // 帧回调绘制波形，释放主线程
                requestAnimationFrame(() => drawWaveform(float32Array, outputCtx));
                audioBuffer.copyToChannel(float32Array, 0);

                const source = audioContext2.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext2.destination);
                source.start();

                currentSource = source;

                // 播放错误兜底：跳过错误分片，不终止整体播放
                source.onerror = (e) => {
                    console.error('音频分片播放错误，跳过:', e);
                    currentSource = null;
                    playNextAudio();
                };

                source.onended = () => {
                    currentSource = null;
                    playNextAudio();
                };
            } catch (e) {
                console.error('播放流程错误，继续下一分片:', e);
                playNextAudio();
            }
        }

        // 修复：波形抽稀+异常捕获，减少计算量，避免阻塞主线程
        function drawWaveform(data, context) {
            try {
                context.clearRect(0, 0, context.canvas.width, context.canvas.height);
                context.beginPath();
                context.moveTo(0, context.canvas.height / 2);
                // 抽稀：按画布宽度取点，减少循环计算
                const step = Math.ceil(data.length / context.canvas.width);
                for (let i = 0; i < data.length; i += step) {
                    const x = (i / data.length) * context.canvas.width;
                    const y = (1 - data[i]) * context.canvas.height / 2;
                    context.lineTo(x, y);
                }
                context.stroke();
            } catch (e) {
                console.error('波形绘制错误:', e);
            }
        }

    </script>
</body>
</html>
